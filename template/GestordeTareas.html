<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Gestor de Tareas</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Perfil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Cerrar Sesión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <div class="container mt-5">
        <!-- Mensaje de Bienvenida -->
        <div class="row mb-4">
            <div class="col-12">
                <h2>¡Bienvenido a tu Gestor de Tareas!</h2>
                <p class="text-muted">Organiza y gestiona todas tus tareas en un solo lugar</p>
            </div>
        </div>

        <!-- Botones de Acciones -->
        <div class="row mb-4">
            <div class="col-12 d-flex gap-2">
                <button type="button" class="btn btn-primary">+ Agregar Tarea</button>
                <button type="button" class="btn btn-secondary">Ver todas las Tareas</button>
            </div>
        </div>

        <!-- Sección de Tareas Vacía -->
        <div class="row">
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Tus Tareas</h5>
                    </div>
                    <div class="card-body text-center">
                        <p class="text-muted">...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
